name: CI & Deploy

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        run: pip install --no-cache-dir -r backend/requirements.txt

      - name: Backend tests (pytest)
        working-directory: backend
        run: python -m pytest -q

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Frontend install + build
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Frontend tests
        working-directory: frontend
        run: npm run test -- --run

      - uses: docker/setup-buildx-action@v3
      - name: Docker build (catches image breakage before Render/Railway sees it)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: ai-first-sql-workbench:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Trigger Render deploy hook
        env:
          RENDER_DEPLOY_HOOK: ${{ secrets.RENDER_DEPLOY_HOOK }}
        run: |
          set -eu
          if [ -z "${RENDER_DEPLOY_HOOK:-}" ]; then
            echo "::error::RENDER_DEPLOY_HOOK secret is not set. Skipping deploy."
            echo "If hosting on Railway instead, its native GitHub integration auto-deploys main directly — this step is unused in that case."
            exit 1
          fi
          # Token lives only in the URL for this one request; never echoed to logs.
          code=$(curl -s -o /dev/null -w '%{http_code}' -X POST "$RENDER_DEPLOY_HOOK")
          echo "Deploy hook responded HTTP ${code}"
          [ "$code" -ge 200 ] && [ "$code" -lt 300 ]

      - name: Poll ${DEPLOY_URL}/api/health until it's live
        env:
          DEPLOY_URL: ${{ vars.DEPLOY_URL }}
        run: |
          set -eu
          if [ -z "${DEPLOY_URL:-}" ]; then
            echo "::warning::DEPLOY_URL repo variable is not set — skipping post-deploy smoke test."
            exit 0
          fi
          url="${DEPLOY_URL%/}/api/health"
          echo "Polling ${url} (Render can take a few minutes to build)…"
          for i in $(seq 1 30); do
            code=$(curl -s -o /tmp/health.json -m 15 -w '%{http_code}' "$url" || echo "000")
            echo "  attempt ${i}/30: HTTP ${code}"
            if [ "$code" = "200" ]; then
              echo "Live: $(cat /tmp/health.json)"
              exit 0
            fi
            sleep 20
          done
          echo "::error::Deploy did not return HTTP 200 within ~10 minutes."
          exit 1

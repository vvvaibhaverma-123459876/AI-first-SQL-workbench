name: CI & Deploy

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: sqlstudio
          POSTGRES_PASSWORD: sqlstudio
          POSTGRES_DB: sqlstudio
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U sqlstudio"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      mysql:
        image: mysql:8
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_USER: sqlstudio
          MYSQL_PASSWORD: sqlstudio
          MYSQL_DATABASE: sqlstudio
        ports:
          - 3306:3306
        options: >-
          --health-cmd "mysqladmin ping -h 127.0.0.1 -u root -proot"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        run: pip install -r backend/requirements.txt

      - name: Backend tests (pytest)
        working-directory: backend
        env:
          # A handful of tests need real foreign-key enforcement that
          # aiosqlite doesn't provide (e.g. delete-cascade correctness) and
          # are skipped without this. Points at postgres's own built-in
          # `postgres` database, not `sqlstudio` -- these tests create their
          # own tables via create_all(), which would collide with the
          # Alembic step below if they shared a database.
          TEST_POSTGRES_URL: postgresql+asyncpg://sqlstudio:sqlstudio@localhost:5432/postgres
          # Real MySQL for the data-connections test suite (app/connections) --
          # root/sqlstudio db, since the connector layer's own MySQL config
          # fields are what's under test, not any particular user account.
          TEST_MYSQL_URL: mysql+pymysql://root:root@localhost:3306/sqlstudio
        run: python -m pytest -q

      - name: Alembic migration applies cleanly to a real Postgres
        working-directory: backend
        env:
          CONTROL_PLANE_DB_URL: postgresql+asyncpg://sqlstudio:sqlstudio@localhost:5432/sqlstudio
        run: alembic upgrade head

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Frontend install + build
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Frontend tests
        working-directory: frontend
        run: npm run test -- --run

      - name: Install Playwright browsers
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Start backend for e2e smoke test
        working-directory: backend
        env:
          CONTROL_PLANE_DB_URL: postgresql+asyncpg://sqlstudio:sqlstudio@localhost:5432/sqlstudio
          AI_MODE: mock
          JWT_SECRET: insecure-dev-secret-change-me
        run: |
          nohup uvicorn app.main:app --host 0.0.0.0 --port 8000 > /tmp/backend-e2e.log 2>&1 &
          for i in $(seq 1 30); do
            curl -sf http://localhost:8000/api/health > /dev/null && exit 0
            sleep 1
          done
          echo "::error::Backend never became healthy for e2e"; cat /tmp/backend-e2e.log; exit 1

      - name: Start frontend dev server for e2e smoke test
        working-directory: frontend
        run: |
          nohup npm run dev -- --port 5173 --strictPort > /tmp/frontend-e2e.log 2>&1 &
          for i in $(seq 1 30); do
            curl -sf http://localhost:5173 > /dev/null && exit 0
            sleep 1
          done
          echo "::error::Frontend dev server never became healthy for e2e"; cat /tmp/frontend-e2e.log; exit 1

      - name: End-to-end IDE smoke test (Playwright)
        working-directory: frontend
        run: npm run test:e2e

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7

      - uses: docker/setup-buildx-action@v3
      - name: Docker build (catches image breakage before Render/Railway sees it)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: ai-first-sql-workbench:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Trigger Render deploy hook
        env:
          RENDER_DEPLOY_HOOK: ${{ secrets.RENDER_DEPLOY_HOOK }}
        run: |
          set -eu
          if [ -z "${RENDER_DEPLOY_HOOK:-}" ]; then
            echo "::error::RENDER_DEPLOY_HOOK secret is not set. Skipping deploy."
            echo "If hosting on Railway instead, its native GitHub integration auto-deploys main directly — this step is unused in that case."
            exit 1
          fi
          # Token lives only in the URL for this one request; never echoed to logs.
          code=$(curl -s -o /dev/null -w '%{http_code}' -X POST "$RENDER_DEPLOY_HOOK")
          echo "Deploy hook responded HTTP ${code}"
          [ "$code" -ge 200 ] && [ "$code" -lt 300 ]

      - name: Poll ${DEPLOY_URL}/api/health until it's live
        env:
          DEPLOY_URL: ${{ vars.DEPLOY_URL }}
        run: |
          set -eu
          if [ -z "${DEPLOY_URL:-}" ]; then
            echo "::warning::DEPLOY_URL repo variable is not set — skipping post-deploy smoke test."
            exit 0
          fi
          url="${DEPLOY_URL%/}/api/health"
          echo "Polling ${url} (Render can take a few minutes to build)…"
          for i in $(seq 1 30); do
            code=$(curl -s -o /tmp/health.json -m 15 -w '%{http_code}' "$url" || echo "000")
            echo "  attempt ${i}/30: HTTP ${code}"
            if [ "$code" = "200" ]; then
              echo "Live: $(cat /tmp/health.json)"
              exit 0
            fi
            sleep 20
          done
          echo "::error::Deploy did not return HTTP 200 within ~10 minutes."
          exit 1

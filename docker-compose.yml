services:
  app:
    build: .
    ports:
      - "8000:8000"
    environment:
      AI_PROVIDER: ollama
      OLLAMA_BASE_URL: http://host.docker.internal:11434
      OLLAMA_MODEL: qwen2.5-coder:7b
    volumes:
      - ./backend/data:/app/backend/data
    extra_hosts:
      - "host.docker.internal:host-gateway"
